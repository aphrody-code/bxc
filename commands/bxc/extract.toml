# /bxc:extract command
description = "Extract structured data from a URL using local AI"

[[parameters]]
name = "url"
description = "The target URL to extract data from"
required = true

[[parameters]]
name = "schema"
description = "JSON schema or Zod-like description of the data"
required = true

[execution]
command = "bxc-mcp"
args = ["call", "bxc_extract_structured", "{\"url\":\"{{url}}\", \"schema\": \"{{schema}}\"}"]
