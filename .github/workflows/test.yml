name: test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: bun test (${{ matrix.os }} / bun ${{ matrix.bun-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        bun-version: [latest, 1.3.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ matrix.bun-version }}-${{ hashFiles('**/bun.lockb', '**/bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ matrix.bun-version }}-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Print Bun version
        run: bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Run tests
        env:
          CI: "true"
        run: bun test
