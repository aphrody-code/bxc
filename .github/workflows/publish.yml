name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-github-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        # --ignore-scripts: the vendored @modelcontextprotocol/sdk workspace has a
        # `prepare: lefthook install` hook that aborts the install on CI runners.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Verify lint
        # Typecheck runs in ci.yml; it cannot gate publish because tsc follows the
        # vendored mcp-sdk workspace into its raw .ts source (not bxc's own code).
        run: bun run lint

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "@aphrody-code:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          bun publish --access public

  publish-npm:
    runs-on: ubuntu-latest
    needs: publish-github-packages
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Publish to npm public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          bun publish --access public --registry https://registry.npmjs.org
