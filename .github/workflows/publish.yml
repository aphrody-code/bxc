name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: Install dependencies
        # --ignore-scripts: the vendored @modelcontextprotocol/sdk workspace has a
        # `prepare: lefthook install` hook that aborts the install on CI runners.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Verify lint
        # Typecheck runs in ci.yml; it cannot gate publish because tsc follows the
        # vendored mcp-sdk workspace into its raw .ts source (not bxc's own code).
        run: bun run lint

      - name: Publish to npm public (@aphrody scope)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "@aphrody:registry=https://registry.npmjs.org" > .npmrc
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
          bun publish --access public --registry https://registry.npmjs.org
