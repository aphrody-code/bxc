name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: bun-linux-x64
            suffix: linux-x64
          - runner: ubuntu-latest
            target: bun-linux-arm64
            suffix: linux-arm64
          - runner: macos-latest
            target: bun-darwin-x64
            suffix: darwin-x64
          - runner: macos-latest
            target: bun-darwin-arm64
            suffix: darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build standalone executable
        run: |
          mkdir -p dist/standalone
          bun build --compile --target=${{ matrix.target }} ./bin/bunlight --outfile dist/standalone/bunlight-${{ matrix.suffix }}

      - name: Smoke test (host arch only)
        if: matrix.suffix == 'linux-x64' || matrix.suffix == 'darwin-arm64'
        run: ./dist/standalone/bunlight-${{ matrix.suffix }} --version || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bunlight-${{ matrix.suffix }}
          path: dist/standalone/bunlight-${{ matrix.suffix }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: GitHub release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  npm:
    name: npm publish
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node for npm registry auth
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
