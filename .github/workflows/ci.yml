name: CI - Ultra Enforcement

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.4.0-canary.1
      - name: Install dependencies
        run: bun install
      - name: Lint (Oxlint)
        run: bun run lint
      - name: Typecheck (TSC)
        run: bun run typecheck

  test-linux:
    name: Test (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-bridge
      - name: Build Rust Bridge
        run: cd rust-bridge && cargo build --release
      - name: Run Tests (Core)
        run: bun test
        env:
          BXC_RUST_BRIDGE_LIB: ${{ github.workspace }}/rust-bridge/target/release/libbxc_rust_bridge.so
          SKIP_NETWORK_TESTS: "1"

  test-windows:
    name: Test (Windows x64 MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-bridge
      - name: Build Rust Bridge (MSVC)
        run: |
          cd rust-bridge
          cargo build --release --target x86_64-pc-windows-msvc
        env:
          RUSTFLAGS: "-C target-feature=+crt-static -C target-cpu=x86-64-v3"
      - name: Run Tests (Core)
        run: bun test
        env:
          BXC_RUST_BRIDGE_LIB: ${{ github.workspace }}\rust-bridge\target\x86_64-pc-windows-msvc\release\bxc_rust_bridge.dll
          SKIP_NETWORK_TESTS: "1"
