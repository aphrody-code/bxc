[project]
name = "gemma4-vps"
version = "0.1.0"
description = "Gemma 4 E2B native inference on Ubuntu 26 KVM (CPU AVX2)"
requires-python = ">=3.12,<3.15"
dependencies = [
  "gemma",
  "transformers>=4.45",
  "accelerate>=1.0",
  "huggingface_hub[cli]>=0.30",
  "torch",
  "numpy",
  "pillow",
  "soundfile",
]

[tool.uv]
index-strategy = "unsafe-best-match"

[tool.uv.sources]
torch = { index = "pytorch-cpu" }

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true
